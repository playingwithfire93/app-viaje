<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Pink background -->
  <rect width="512" height="512" fill="#FFB7C5"/>
  <!-- Pixel border outer (hot pink) -->
  <rect x="8" y="8" width="496" height="496" fill="none" stroke="#FF2D78" stroke-width="12"/>
  <!-- Pixel border inner (lavender) -->
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="#C8A8E9" stroke-width="4"/>
  <!-- Corner pixel squares (decorative) -->
  <rect x="28" y="28" width="16" height="16" fill="#FF2D78"/>
  <rect x="468" y="28" width="16" height="16" fill="#FF2D78"/>
  <rect x="28" y="468" width="16" height="16" fill="#FF2D78"/>
  <rect x="468" y="468" width="16" height="16" fill="#FF2D78"/>
  <!-- Main emoji -->
  <text x="256" y="310" font-size="240"
        text-anchor="middle"
        font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji, sans-serif">🎭</text>
  <!-- App name -->
  <text x="256" y="430" font-size="32" text-anchor="middle"
        font-family="monospace" fill="#FF2D78" letter-spacing="4" font-weight="bold">TRIPS</text>
  <!-- Small star decorations -->
  <text x="80" y="200" font-size="28" text-anchor="middle"
        font-family="monospace" fill="#C8A8E9">★</text>
  <text x="432" y="200" font-size="28" text-anchor="middle"
        font-family="monospace" fill="#C8A8E9">★</text>
  <text x="80" y="350" font-size="20" text-anchor="middle"
        font-family="monospace" fill="#FFD166">♪</text>
  <text x="432" y="350" font-size="20" text-anchor="middle"
        font-family="monospace" fill="#FFD166">♪</text>
</svg>
